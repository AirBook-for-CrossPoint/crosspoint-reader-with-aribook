name: Compile Release
on:
  push:
    tags:
      - '*'

permissions:
  contents: write   # required for softprops/action-gh-release to attach the .bin

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Build CrossPoint
        run: pio run -e gh_release

      - name: Upload Artifacts (retain build output for download)
        uses: actions/upload-artifact@v4
        with:
          name: CrossPoint-${{ github.ref_name }}
          path: |
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/firmware.elf
            .pio/build/gh_release/firmware.map
            .pio/build/gh_release/partitions.bin

      - name: Attach firmware.bin to GitHub Release
        # softprops/action-gh-release attaches to the release matching the
        # pushed tag if one exists, otherwise creates one. We always pre-
        # create the release via `gh release create` (so the notes get
        # written by hand), so in practice this just adds the asset.
        # Web flasher and iOS firmware checker both pull from this asset.
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/partitions.bin
          fail_on_unmatched_files: true
